<!DOCTYPE html>
<html lang="ru">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">



<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Startpage</title>
</head>



<body>
    <div class="main-container">
        <input type="text" id="search-input" placeholder="" autofocus>
        <div class="container-w">
            <div class="image-container">
                <img id="picsha" src="image/image2.jpg" />
            </div>
            <div class="container">

                <div class="panel-wrapper">
                    <div class="panel-label"> дата и время </div>
                    <div class="panel">
                        <div class=date-and-time>
                            <div id="clock" class="clock">00:00</div>
                            <div id="date">дата</div>
                        </div>
                    </div>
                </div>


                <div class="panel-wrapper">

                    <div class="panel-links">
                        <ul>
                            <h4>Медиа</h4>
                            <li> <a class="link" href="https://youtube.com">YouTube</a> </li>
                            <li> <a class="link" href="https://ru.pinterest.com/">Pinterest</a> </li>
                        </ul>
                        <ul>
                            <h4>Полезное</h4>
                            <li> <a class="link" href="https://github.com">GitHub</a> </li>
                            <li> <a class="link" href="https://mail.google.com">Gmail</a> </li>
                            <li> <a class="link" href="https://reddit.com">Reddit</a> </li>
                        </ul>

                    </div>
                    <div class="panel-label"> Ссылки </div>
                </div>
            </div>
            <script src="script.js"></script>
        </div>
    </div>

</body>

</html>
